# enable remote control
allow_remote_control yes

# shortcuts
clear_all_shortcuts yes
kitty_mod ctrl+shift

map ctrl+shift+f5       load_config_file
map ctrl+shift+delete   clear_terminal reset active
map ctrl+c              copy_and_clear_or_interrupt
map ctrl+v              paste_from_clipboard
map super+c             copy_and_clear_or_interrupt
map super+v             paste_from_clipboard
map alt+up              previous_window
map alt+down            next_window
map alt+left            previous_window
map alt+right           next_window
map alt+c               close_window
map ctrl+shift+up       move_window up
map ctrl+shift+down     move_window down
map ctrl+shift+left     move_window left
map ctrl+shift+right    move_window right
map ctrl+shift+h        launch --location=hsplit
map ctrl+shift+v        launch --location=vsplit
map ctrl+n              new_window_with_cwd
map ctrl+t              new_tab_with_cwd
map ctrl+shift+tab      previous_tab
map ctrl+tab            next_tab
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+plus     change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0

# font
font_family   Maple Mono NF
font_size     12.0

# cursor
cursor_shape block

# border
hide_window_decorations   yes

# window
draw_minimal_borders        yes
window_border_width         0.5
window_margin_width         0
window_padding_width        5
single_window_margin_width  0
single_window_padding_width 5
placement_strategy          center

# tab
tab_bar_style             separator
tab_bar_edge              top
tab_bar_align             center
tab_bar_margin_width      0
tab_bar_margin_height     5 5
tab_separator             ""
tab_title_template        " {index} "
active_tab_title_template " {index} "
active_tab_font_style     none
inactive_tab_font_style   none

# clipboard
strip_trailing_spaces smart

# layout
enabled_layouts splits

# macos
macos_show_window_title_in none

# theme (from habamax vim)

# black and dark gray
color0  #c7c7c7
color8  #767676

# dark red and red
color1  #af5f5f
color9  #d75f87

# dark green and gree
color2  #5faf5f
color10 #87d787

# dark yellow and yellow
color3  #af875f
color11 #d7af87

# dark blue and blue
color4  #5f87af
color12 #5fafd7

# dark magenta and magenta
color5  #af87af
color13 #d787d7

# dark cyan and cyan
color6  #5f8787
color14 #87afaf

# gray and white
color7  #9e9e9e
color15 #c7c7c7

foreground              #c7c7c7
background              #1c1c1c
selection_foreground    #1c1c1c
selection_background    #87afaf
url_color               #5f87af
cursor                  #c7c7c7
cursor_text_color       #1c1c1c
active_border_color     #1a1a1a
inactive_border_color   #1a1a1a
bell_border_color       #1a1a1a
tab_bar_background      #1c1c1c
active_tab_foreground   #c7c7c7
active_tab_background   #1c1c1c
inactive_tab_foreground #9e9e9e
inactive_tab_background #1c1c1c

